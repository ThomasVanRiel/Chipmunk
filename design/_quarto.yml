        - usage.md
    - part: "Design Documents"
      chapters:
        - docs/00-overview.md
        - docs/01-data-model.md
        - docs/02-api-design.md
        - docs/03-nc-and-postprocessors.md
        - docs/04-toolpath-algorithms.md
        - docs/05-frontend-design.md
        - docs/06-project-structure.md
        - docs/07-implementation-phases.md
        - docs/08-integrations.md
        - docs/09-part-update.md
        - docs/10-opencascade.md
        - docs/11-plugin-system.md
    - part: "Tasks"
      chapters:
        - tasks/README.md
        - tasks/backlog.md
    - part: "Discussions"
      chapters:
        - discussions/DECISIONS.md
        - discussions/api.md
        - discussions/brep-geometry.md
        - discussions/opencascade-bindings.md
